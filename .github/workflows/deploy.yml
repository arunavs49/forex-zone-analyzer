name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: acrforexmcpxo6r7fsqmrtrg
  IMAGE_NAME: forex-mcp-server
  WORKER_IMAGE_NAME: forex-worker
  CONTAINER_APP_NAME: ca-forex-mcp
  WORKER_APP_NAME: ca-forex-mcp-worker
  RESOURCE_GROUP: rg-forex-mcp

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ZoneAnalyzer.sln

      - name: Build
        run: dotnet build src/ZoneAnalyzer.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/ZoneAnalyzer.sln --no-build --configuration Release --verbosity normal

  deploy:
    name: Deploy to Azure
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push MCP server image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build and push Worker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -f Dockerfile.worker -t $ACR_NAME.azurecr.io/$WORKER_IMAGE_NAME:$IMAGE_TAG -t $ACR_NAME.azurecr.io/$WORKER_IMAGE_NAME:latest .
          docker push $ACR_NAME.azurecr.io/$WORKER_IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/$WORKER_IMAGE_NAME:latest

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment sub create \
            --location eastus2 \
            --template-file infra/main.bicep \
            --parameters \
              oandaApiToken="${{ secrets.OANDA_API_TOKEN }}" \
              entraIdTenantId="${{ secrets.AZURE_TENANT_ID }}" \
              entraIdClientId="${{ secrets.ENTRA_CLIENT_ID }}" \
              imageTag="${{ github.sha }}" \
              deployApp=true \
              deployWorker=true \
              notificationEmail="${{ secrets.NOTIFICATION_EMAIL }}"

      - name: Deploy MCP server to Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

      - name: Deploy Worker to Container Apps
        run: |
          az containerapp update \
            --name $WORKER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$WORKER_IMAGE_NAME:$IMAGE_TAG
