name: ZoneRadar
targets:
  ZoneRadar:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ForexZoneApp
    info:
      path: ForexZoneApp/Info.plist
      properties:
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.zoneradar.app.zone-refresh
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleDisplayName: ZoneRadar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zoneradar.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
